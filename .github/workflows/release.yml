name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      semver: ${{ steps.meta.outputs.semver }}
      dmg: ${{ steps.release.outputs.dmg_filename }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @graphnosis-app/core build

      - name: Build signed demo .gsk packs
        env:
          GSK_SIGNING_KEY_HEX: ${{ secrets.GSK_SIGNING_KEY_HEX }}
        run: |
          if [ -z "$GSK_SIGNING_KEY_HEX" ]; then
            echo "ERROR: GSK_SIGNING_KEY_HEX secret is not set."
            echo "Generate the keypair locally with scripts/gen-gsk-keypair.mjs,"
            echo "then add the 64-byte hex secret as a repo Actions secret."
            exit 1
          fi
          node scripts/build-gsk.mjs --sign

      - name: Build sidecar
        run: pnpm --filter @graphnosis-app/desktop-sidecar build

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -k $KEYCHAIN_PATH -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Stage libonnxruntime for signing
        run: |
          DYLIB="libonnxruntime.1.21.0.dylib"
          DEST="apps/desktop/src-tauri/resources/$DYLIB"
          mkdir -p "$(dirname "$DEST")"
          SRC=$(find node_modules/.pnpm -path "*/darwin/arm64/$DYLIB" | head -1)
          if [ -z "$SRC" ]; then
            echo "ERROR: $DYLIB not found in node_modules/.pnpm" && exit 1
          fi
          cp "$SRC" "$DEST"
          echo "Staged $SRC → $DEST"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sign libonnxruntime
        run: |
          codesign --force --sign "Developer ID Application: Nehloo Interactive LLC (C76ZLJ5UQW)" \
            --options runtime --timestamp \
            apps/desktop/src-tauri/resources/libonnxruntime.1.21.0.dylib

      - name: Build and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: C76ZLJ5UQW
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm --filter @graphnosis-app/desktop tauri:build

      - name: Derive version and DMG filename
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME}
          SEMVER=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT

      - name: Collect updater artifacts and generate latest.json
        id: updater
        run: |
          SEMVER="${{ steps.meta.outputs.semver }}"
          VERSION="${{ steps.meta.outputs.version }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle/macos"

          TAR_SRC="${BUNDLE_DIR}/Graphnosis.app.tar.gz"
          SIG_SRC="${TAR_SRC}.sig"
          TAR_DEST="${BUNDLE_DIR}/Graphnosis_${SEMVER}_aarch64.app.tar.gz"

          if [ ! -f "$TAR_SRC" ]; then
            echo "ERROR: $TAR_SRC not found. Was TAURI_SIGNING_PRIVATE_KEY set?" && exit 1
          fi
          mv "$TAR_SRC" "$TAR_DEST"

          SIG=$(cat "$SIG_SRC")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << EOF
          {
            "version": "${SEMVER}",
            "notes": "See full changelog: https://github.com/nehloo-interactive/graphnosis-app/releases/tag/${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/nehloo-interactive/graphnosis-app/releases/download/${VERSION}/Graphnosis_${SEMVER}_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          echo "tar_path=${TAR_DEST}" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEMVER="${{ steps.meta.outputs.semver }}"
          VERSION="${{ steps.meta.outputs.version }}"
          TAR_PATH="${{ steps.updater.outputs.tar_path }}"

          DMG_PATH=$(find apps/desktop/src-tauri/target -name "*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "ERROR: no .dmg found under apps/desktop/src-tauri/target" && exit 1
          fi
          echo "Found DMG: $DMG_PATH"
          echo "dmg_filename=$(basename "$DMG_PATH")" >> $GITHUB_OUTPUT

          gh release create "$VERSION" \
            "$DMG_PATH#Graphnosis ${VERSION} (macOS Apple Silicon)" \
            "$TAR_PATH#Graphnosis ${VERSION} — Auto-Update bundle" \
            "latest.json" \
            --title "Graphnosis ${VERSION}" \
            --generate-notes

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain

  build-windows:
    runs-on: windows-2022
    needs: build-mac
    permissions:
      contents: write
      id-token: write
    outputs:
      msi: ${{ steps.find.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace core package
        run: pnpm --filter @graphnosis-app/core build

      - name: Build signed demo .gsk packs
        shell: pwsh
        env:
          GSK_SIGNING_KEY_HEX: ${{ secrets.GSK_SIGNING_KEY_HEX }}
        run: |
          if (-not $env:GSK_SIGNING_KEY_HEX) {
            Write-Error "GSK_SIGNING_KEY_HEX secret is not set."
            exit 1
          }
          node scripts/build-gsk.mjs --sign

      - name: Build sidecar
        run: pnpm --filter @graphnosis-app/desktop-sidecar build

      - name: Stage onnxruntime.dll (optional)
        shell: pwsh
        run: |
          $dest = "apps/desktop/src-tauri/resources"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $dll = Get-ChildItem -Recurse -Filter "onnxruntime.dll" node_modules/.pnpm `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "win32.x64" } |
            Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName "$dest/onnxruntime.dll"
            Write-Host "Staged $($dll.FullName) -> $dest/onnxruntime.dll"
          } else {
            Write-Warning "onnxruntime.dll not found — embeddings will use TF-IDF fallback"
          }

      - name: Build (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm --filter @graphnosis-app/desktop tauri:build

      - name: Ensure PSGallery is registered
        shell: powershell
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            try { Register-PSRepository -Default } catch { Write-Host "Register-PSRepository: $_" }
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

      - name: Sign NSIS installer (Azure Artifact Signing)
        uses: azure/trusted-signing-action@v0.5.11
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: nehloo-trusted-signing
          certificate-profile-name: graphnosis-public
          files-folder: apps/desktop/src-tauri/target/release/bundle/nsis
          files-folder-filter: exe
          files-folder-recurse: false
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign MSI (Azure Artifact Signing)
        uses: azure/trusted-signing-action@v0.5.11
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: nehloo-trusted-signing
          certificate-profile-name: graphnosis-public
          files-folder: apps/desktop/src-tauri/target/release/bundle/msi
          files-folder-filter: msi
          files-folder-recurse: false
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Find MSI
        id: find
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Recurse `
            apps/desktop/src-tauri/target/release/bundle/msi `
            -Filter "*.msi" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI found in bundle/msi output"
            exit 1
          }
          echo "path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload MSI to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "${{ needs.build-mac.outputs.version }}" `
            "${{ steps.find.outputs.path }}" --clobber

  build-linux:
    runs-on: ubuntu-22.04
    needs: build-mac
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri v2 Linux build dependencies (webkit2gtk 4.1) + patchelf for the
      # AppImage. Built on 22.04 (not latest) for the widest glibc compatibility
      # of the resulting AppImage.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf libfuse2

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable, x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      # Required by src-tauri/build.rs, which bun-compiles the sidecar + MCP
      # relay for the linux target during `cargo build` (maps
      # x86_64-unknown-linux-gnu -> bun-linux-x64) and stages the linux
      # onnxruntime .so into resources/.
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace core package
        run: pnpm --filter @graphnosis-app/core build

      - name: Build signed demo .gsk packs
        env:
          GSK_SIGNING_KEY_HEX: ${{ secrets.GSK_SIGNING_KEY_HEX }}
        run: |
          if [ -z "$GSK_SIGNING_KEY_HEX" ]; then
            echo "ERROR: GSK_SIGNING_KEY_HEX secret is not set." && exit 1
          fi
          node scripts/build-gsk.mjs --sign

      - name: Build sidecar
        run: pnpm --filter @graphnosis-app/desktop-sidecar build

      # tauri.linux.conf.json selects the deb + appimage bundle targets and the
      # linux externalBin/resources (auto-merged by Tauri on the linux host).
      - name: Build (Linux deb + AppImage)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # GitHub runners lack FUSE; extract-and-run instead of FUSE-mounting,
          # else AppImage bundling dies with "failed to run linuxdeploy".
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: pnpm --filter @graphnosis-app/desktop tauri:build

      - name: Upload Linux artifacts to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build-mac.outputs.version }}"
          SEMVER="${VERSION#v}"
          BUNDLE="apps/desktop/src-tauri/target/release/bundle"
          APPIMAGE=$(find "$BUNDLE" -name "*.AppImage" | head -1)
          DEB=$(find "$BUNDLE" -name "*.deb" | head -1)
          if [ -z "$APPIMAGE" ] || [ -z "$DEB" ]; then
            echo "ERROR: AppImage or .deb not found under $BUNDLE"
            find "$BUNDLE" -maxdepth 2 -type f || true
            exit 1
          fi
          # Copy to canonical, predictable names so the static /download/linux
          # redirects resolve deterministically (Tauri tends to lowercase the
          # .deb package name; forcing the asset name sidesteps that).
          cp "$APPIMAGE" "Graphnosis_${SEMVER}_amd64.AppImage"
          cp "$DEB"      "Graphnosis_${SEMVER}_amd64.deb"
          gh release upload "$VERSION" \
            "Graphnosis_${SEMVER}_amd64.AppImage#Graphnosis ${VERSION} (Linux AppImage)" \
            "Graphnosis_${SEMVER}_amd64.deb#Graphnosis ${VERSION} (Linux .deb)" \
            --clobber

  update-cloudflare:
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - name: Update Cloudflare Pages env vars
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"deployment_configs\": {
                \"production\": {
                  \"env_vars\": {
                    \"CURRENT_VERSION\": { \"value\": \"${{ needs.build-mac.outputs.version }}\" },
                    \"DMG_FILENAME\": { \"value\": \"${{ needs.build-mac.outputs.dmg }}\" },
                    \"WINDOWS_FILENAME\": { \"value\": \"${{ needs.build-windows.outputs.msi }}\" },
                    \"PUBLIC_RELEASED_VERSION\": { \"value\": \"${{ needs.build-mac.outputs.version }}\" }
                  }
                }
              }
            }"

      - name: Trigger Cloudflare Pages redeploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments" \
            -H "Authorization: Bearer $CF_API_TOKEN"
