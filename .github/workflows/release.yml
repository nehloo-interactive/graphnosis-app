name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @graphnosis-app/core build

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -k $KEYCHAIN_PATH -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Stage libonnxruntime for signing
        run: |
          DYLIB="libonnxruntime.1.21.0.dylib"
          DEST="apps/desktop/src-tauri/resources/$DYLIB"
          mkdir -p "$(dirname "$DEST")"
          SRC=$(find node_modules/.pnpm -path "*/darwin/arm64/$DYLIB" | head -1)
          if [ -z "$SRC" ]; then
            echo "ERROR: $DYLIB not found in node_modules/.pnpm" && exit 1
          fi
          cp "$SRC" "$DEST"
          echo "Staged $SRC → $DEST"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sign libonnxruntime
        run: |
          codesign --force --sign "Developer ID Application: Nehloo Interactive LLC (C76ZLJ5UQW)" \
            --options runtime --timestamp \
            apps/desktop/src-tauri/resources/libonnxruntime.1.21.0.dylib

      - name: Build and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: C76ZLJ5UQW
        run: pnpm --filter @graphnosis-app/desktop tauri:build

      - name: Derive version and DMG filename
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME}
          SEMVER=${VERSION#v}
          DMG="Graphnosis_${SEMVER}_aarch64.dmg"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "dmg=$DMG" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH="apps/desktop/src-tauri/target/release/bundle/dmg/Graphnosis_${{ steps.meta.outputs.semver }}_aarch64.dmg"
          gh release create ${{ steps.meta.outputs.version }} \
            "$DMG_PATH#Graphnosis ${{ steps.meta.outputs.version }} (macOS Apple Silicon)" \
            --title "Graphnosis ${{ steps.meta.outputs.version }}" \
            --generate-notes

      - name: Update Cloudflare Pages env vars
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"deployment_configs\": {
                \"production\": {
                  \"env_vars\": {
                    \"CURRENT_VERSION\": { \"value\": \"${{ steps.meta.outputs.version }}\" },
                    \"DMG_FILENAME\": { \"value\": \"${{ steps.meta.outputs.dmg }}\" }
                  }
                }
              }
            }"

      - name: Trigger Cloudflare Pages redeploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments" \
            -H "Authorization: Bearer $CF_API_TOKEN"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain
