name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @graphnosis-app/core build

      # Three signed Graphnosis demo .gsk packs auto-load into a "Skill
      # Demos" engram on first cortex unlock. They must be (re)built BEFORE
      # the sidecar build, because apps/desktop-sidecar/scripts/
      # generate-skill-demos-content.mjs reads dist/packs/bundle/*.gsk and
      # embeds them base64 into src/skill-demos.generated.ts — which ipc.ts
      # imports. Missing → "Could not resolve: ./skill-demos.generated.js"
      # which is exactly the v1.12.0 build failure that exposed this gap.
      - name: Build signed demo .gsk packs
        env:
          GSK_SIGNING_KEY_HEX: ${{ secrets.GSK_SIGNING_KEY_HEX }}
        run: |
          if [ -z "$GSK_SIGNING_KEY_HEX" ]; then
            echo "ERROR: GSK_SIGNING_KEY_HEX secret is not set."
            echo "Generate the keypair locally with scripts/gen-gsk-keypair.mjs,"
            echo "then add the 64-byte hex secret as a repo Actions secret."
            exit 1
          fi
          node scripts/build-gsk.mjs --sign

      # Generates src/skill-demos.generated.ts (consumed by ipc.ts) and
      # produces dist/index.js (consumed by Tauri's build.rs which runs
      # `bun build --compile` to produce
      # binaries/graphnosis-sidecar-aarch64-apple-darwin — the missing
      # sidecar binary in the v1.12.0 failure).
      - name: Build sidecar
        run: pnpm --filter @graphnosis-app/desktop-sidecar build

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -k $KEYCHAIN_PATH -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Stage libonnxruntime for signing
        run: |
          DYLIB="libonnxruntime.1.21.0.dylib"
          DEST="apps/desktop/src-tauri/resources/$DYLIB"
          mkdir -p "$(dirname "$DEST")"
          SRC=$(find node_modules/.pnpm -path "*/darwin/arm64/$DYLIB" | head -1)
          if [ -z "$SRC" ]; then
            echo "ERROR: $DYLIB not found in node_modules/.pnpm" && exit 1
          fi
          cp "$SRC" "$DEST"
          echo "Staged $SRC → $DEST"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sign libonnxruntime
        run: |
          codesign --force --sign "Developer ID Application: Nehloo Interactive LLC (C76ZLJ5UQW)" \
            --options runtime --timestamp \
            apps/desktop/src-tauri/resources/libonnxruntime.1.21.0.dylib

      - name: Build and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: C76ZLJ5UQW
          # Tauri reads this to sign the .app.tar.gz update artifact.
          # The private key content (not the path) goes in the secret.
          # Key was generated without a password so no _PASSWORD var is needed.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm --filter @graphnosis-app/desktop tauri:build

      - name: Derive version and DMG filename
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME}
          SEMVER=${VERSION#v}
          DMG="Graphnosis_${SEMVER}_aarch64.dmg"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "dmg=$DMG" >> $GITHUB_OUTPUT

      - name: Collect updater artifacts and generate latest.json
        id: updater
        run: |
          SEMVER="${{ steps.meta.outputs.semver }}"
          VERSION="${{ steps.meta.outputs.version }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle/macos"

          # Tauri produces Graphnosis.app.tar.gz + .sig when TAURI_SIGNING_PRIVATE_KEY is set.
          TAR_SRC="${BUNDLE_DIR}/Graphnosis.app.tar.gz"
          SIG_SRC="${TAR_SRC}.sig"
          TAR_DEST="${BUNDLE_DIR}/Graphnosis_${SEMVER}_aarch64.app.tar.gz"

          if [ ! -f "$TAR_SRC" ]; then
            echo "ERROR: $TAR_SRC not found. Was TAURI_SIGNING_PRIVATE_KEY set?" && exit 1
          fi
          mv "$TAR_SRC" "$TAR_DEST"

          SIG=$(cat "$SIG_SRC")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Produce latest.json consumed by tauri-plugin-updater in shipped apps.
          cat > latest.json << EOF
          {
            "version": "${SEMVER}",
            "notes": "See full changelog: https://github.com/nehloo-interactive/graphnosis-app/releases/tag/${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/nehloo-interactive/graphnosis-app/releases/download/${VERSION}/Graphnosis_${SEMVER}_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          echo "tar_path=${TAR_DEST}" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEMVER="${{ steps.meta.outputs.semver }}"
          VERSION="${{ steps.meta.outputs.version }}"
          TAR_PATH="${{ steps.updater.outputs.tar_path }}"

          # Locate the DMG produced by Tauri — the arch suffix in the filename
          # varies by runner (aarch64 on Apple Silicon, x86_64 on Intel).
          # Search both the native-target dir and the cross-compile target dir.
          DMG_PATH=$(find apps/desktop/src-tauri/target -name "*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "ERROR: no .dmg found under apps/desktop/src-tauri/target" && exit 1
          fi
          echo "Found DMG: $DMG_PATH"
          echo "dmg_filename=$(basename "$DMG_PATH")" >> $GITHUB_OUTPUT

          gh release create "$VERSION" \
            "$DMG_PATH#Graphnosis ${VERSION} (macOS Apple Silicon)" \
            "$TAR_PATH#Graphnosis ${VERSION} — Auto-Update bundle" \
            "latest.json" \
            --title "Graphnosis ${VERSION}" \
            --generate-notes

      - name: Update Cloudflare Pages env vars
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"deployment_configs\": {
                \"production\": {
                  \"env_vars\": {
                    \"CURRENT_VERSION\": { \"value\": \"${{ steps.meta.outputs.version }}\" },
                    \"DMG_FILENAME\": { \"value\": \"${{ steps.release.outputs.dmg_filename }}\" },
                    \"PUBLIC_RELEASED_VERSION\": { \"value\": \"${{ steps.meta.outputs.version }}\" }
                  }
                }
              }
            }"

      - name: Trigger Cloudflare Pages redeploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments" \
            -H "Authorization: Bearer $CF_API_TOKEN"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain
