name: Build (Windows)

# Manual trigger for Windows test builds.
# Produces a signed NSIS (.exe) and/or MSI installer as a downloadable artifact.
# Signing uses Azure Artifact Signing (nehloo-trusted-signing / graphnosis-public profile).
# Windows-specific config is in src-tauri/tauri.windows.conf.json (auto-loaded by Tauri).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (default: main)'
        required: false
        default: 'main'

jobs:
  build-windows:
    runs-on: windows-2022
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace core package
        run: pnpm --filter @graphnosis-app/core build

      # See the same step in release.yml for rationale. PowerShell variant
      # for the Windows runner — same shell-agnostic effect.
      - name: Build signed demo .gsk packs
        shell: pwsh
        env:
          GSK_SIGNING_KEY_HEX: ${{ secrets.GSK_SIGNING_KEY_HEX }}
        run: |
          if (-not $env:GSK_SIGNING_KEY_HEX) {
            Write-Error "GSK_SIGNING_KEY_HEX secret is not set. Generate the keypair locally with scripts/gen-gsk-keypair.mjs, then add the 64-byte hex secret as a repo Actions secret."
            exit 1
          }
          node scripts/build-gsk.mjs --sign

      - name: Build sidecar
        run: pnpm --filter @graphnosis-app/desktop-sidecar build

      # Stage onnxruntime.dll so the sidecar can load ONNX embeddings at
      # runtime. Falls back to a TF-IDF-only warning if not found — the build
      # still succeeds. The dll is NOT listed in tauri-windows.conf.json
      # resources because build.rs also copies it; explicit staging here
      # is belt-and-suspenders for CI.
      - name: Stage onnxruntime.dll (optional)
        shell: pwsh
        run: |
          $dest = "apps/desktop/src-tauri/resources"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $dll = Get-ChildItem -Recurse -Filter "onnxruntime.dll" node_modules/.pnpm `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "win32.x64" } |
            Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName "$dest/onnxruntime.dll"
            Write-Host "Staged $($dll.FullName) -> $dest/onnxruntime.dll"
          } else {
            Write-Warning "onnxruntime.dll not found — embeddings will use TF-IDF fallback"
          }

      - name: Build (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm --filter @graphnosis-app/desktop tauri:build

      - name: Sign installer (Azure Artifact Signing)
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: nehloo-trusted-signing
          certificate-profile-name: graphnosis-public
          files-folder: apps/desktop/src-tauri/target/release/bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Find installer
        id: find
        shell: pwsh
        run: |
          # tauri.windows.conf.json targets both nsis and msi — grab whichever lands first
          $installer = Get-ChildItem -Recurse `
            apps/desktop/src-tauri/target/release/bundle `
            -Include "*.exe","*.msi" -ErrorAction SilentlyContinue |
            Where-Object { $_.DirectoryName -match "nsis|msi" } |
            Select-Object -First 1
          if (-not $installer) {
            Write-Error "No Windows installer found in bundle output"
            exit 1
          }
          echo "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          path: ${{ steps.find.outputs.path }}
          retention-days: 14
