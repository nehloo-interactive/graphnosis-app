packages:
  - 'apps/*'
  - 'packages/*'

# ── Dependency fixes & build-script allowlist ─────────────────────────────────
# These four settings lived in the root package.json `pnpm` field until pnpm
# 10.x stopped reading that field (the "[WARN] The pnpm field in package.json
# is no longer read" printed on every run). Their home is now this file, per
# https://pnpm.io/settings. Until this migration they only kept working
# because pnpm-lock.yaml preserved their effects.

# Postinstall/build scripts are blocked by default in pnpm 10 — these native
# deps genuinely need theirs to run.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - msgpackr-extract
  - onnxruntime-node
  - wtf_wikipedia

# fastembed@2.1.0 pins tar ^6.2.0, which has NO patched release for the
# node-tar path-traversal / arbitrary-file-write advisories
# (GHSA-9ppj-qmqm-q256 and chain) — they are fixed only in tar >=7.5.11. We
# scope the bump to fastembed's own tar (other deps keep theirs) and pair it
# with the fastembed patch below, which rewrites fastembed's tar
# default-import usage (tar 7 removed the default export) so model extraction
# keeps working. Earlier history: secure-sync / @nehloo/graphnosis were once
# pinned to local working copies; both now come from tagged releases — see
# apps/desktop-sidecar/package.json.
overrides:
  'fastembed>tar': '>=7.5.16'

# libsodium-wrappers-sumo@0.7.16 ships a broken ESM entry (relative import to
# ./libsodium-sumo.mjs that the package doesn't include in its files array).
# Force its `.` export to point to the CJS file in ALL conditions so bundlers
# (Bun --compile, Vite, etc.) never pick the broken .mjs. Without this,
# `bun build --compile` of the sidecar fails with
# 'Could not resolve ./libsodium-sumo.mjs'.
packageExtensions:
  libsodium-wrappers-sumo:
    exports:
      '.':
        import: ./dist/modules-sumo/libsodium-wrappers.js
        require: ./dist/modules-sumo/libsodium-wrappers.js
        default: ./dist/modules-sumo/libsodium-wrappers.js

patchedDependencies:
  libsodium-wrappers-sumo: patches/libsodium-wrappers-sumo.patch
  'fastembed@2.1.0': patches/fastembed@2.1.0.patch
